app = "ai-job-search"
primary_region = "arn"

[build]
  dockerfile = "web/Dockerfile"

[env]
  DATABASE_PATH = "/data/app.db"
  REPO_ROOT = "/app"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "data"
  destination = "/data"
